# FIX-13: template variabili d'ambiente backend — copia in env.properties e sostituisci i valori

# Server
SERVER_PORT=3001

# PostgreSQL
PG_HOST=localhost
PG_PORT=5432
PG_DB_NAME=beauty-room
PG_USERNAME=your_db_user
PG_PASSWORD=your_db_password

# JWT
JWT_SECRET=change_me_with_a_long_random_secret_at_least_32_chars

# Cloudinary
CLOUDINARY_NAME=your_cloudinary_cloud_name
CLOUDINARY_KEY=your_cloudinary_api_key
CLOUDINARY_SECRET=your_cloudinary_api_secret

# Admin seed (utente admin creato al primo avvio)
