# Test profile: H2 in-memory, no Flyway, no external services
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.flyway.enabled=false

# JWT (fixed secret for tests)
JWT.SECRET=test-secret-key-at-least-256-bits-required-for-hs256-algorithm
app.jwt.access-expiration-ms=900000

# CORS
app.cors.origins=http://localhost:5173

# Admin (used by AdminInitializer for Auth/Security tests)
admin.nome=Test
admin.cognome=Admin
admin.email=admin@test.local
admin.password=admin123
admin.phone=+393331234567

# Dummy values so beans do not fail (not used in minimal tests)
stripe.secret=sk_test_dummy
stripe.webhook.secret=whsec_dummy
mailgun.apiKey=dummy
mailgun.domain=test.com
mailgun.from=noreply@test.com
mailgun.baseUrl=https://api.mailgun.net
cloudinary.name=dummy
cloudinary.key=dummy
cloudinary.secret=dummy
