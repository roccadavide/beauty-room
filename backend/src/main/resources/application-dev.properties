# Development profile: localhost, debug-friendly JPA, local CORS

# DB (localhost explicit for dev)
spring.datasource.url=jdbc:postgresql://localhost:${PG_PORT:5432}/${PG_DB_NAME}

# JPA: show SQL and auto-update schema for local development
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=validate

# CORS: allow local frontend dev servers
app.cors.origins=http://localhost:3000,http://localhost:5173

# Refresh-cookie Path: dev frontend hits the API through the Vite /api proxy, so the
# browser sees /api/auth/refresh — the cookie Path must match it (prod stays /auth).
app.jwt.refresh-cookie.path=/api/auth

# Flyway: evita fallimento avvio se una migration già applicata è stata modificata (checksum diverso).
# Per allineare lo storico al file corrente senza disattivare la validazione: mvn flyway:repair
spring.flyway.validate-on-migrate=false
