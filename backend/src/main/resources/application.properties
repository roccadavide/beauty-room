spring.application.name=bw5
spring.config.import=optional:file:env.properties
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# SERVER CONFIG
server.port=${SERVER_PORT}

# DB CONFIG
spring.datasource.username=${PG_USERNAME}
spring.datasource.password=${PG_PASSWORD}
spring.datasource.url=jdbc:postgresql://${PG_HOST}:${PG_PORT}/${PG_DB_NAME}
spring.datasource.driver=org.postgresql.Driver

# JPA / Hibernate: disable Open-Session-In-View (OSIV) to avoid long-lived sessions
spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${DDL_AUTO:validate}

# FLYWAY
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=1
spring.flyway.baseline-description=baseline

spring.flyway.validate-on-migrate=true

# JWT
JWT.SECRET=${JWT_SECRET}
app.jwt.access-expiration-ms=${JWT_ACCESS_EXP_MS:900000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXP_MS:1209600000}
# IMPORTANTE: impostare JWT_REFRESH_PEPPER come env variable
# in produzione. Il fallback hardcoded è solo per sviluppo locale.
app.jwt.refresh-pepper=${JWT_REFRESH_PEPPER:beauty-room-pepper-2026}
app.jwt.refresh-cookie.name=refresh_token
app.jwt.refresh-cookie.secure=${JWT_COOKIE_SECURE:false}
app.jwt.refresh-cookie.same-site=${JWT_COOKIE_SAMESITE:Lax}
app.jwt.refresh-cookie.domain=${JWT_COOKIE_DOMAIN:}

# CLOUDINARY
cloudinary.name=${CLOUDINARY_NAME}
cloudinary.key=${CLOUDINARY_KEY}
cloudinary.secret=${CLOUDINARY_SECRET}

# ADMIN
admin.nome=${ADMIN_NAME}
admin.cognome=${ADMIN_SURNAME}
admin.email=${ADMIN_EMAIL}
admin.password=${ADMIN_PASSWORD}
admin.phone=${ADMIN_PHONE}
app.admin.email=${APP_ADMIN_EMAIL:${admin.email}}

# STRIPE
stripe.secret=${STRIPE_SECRET_KEY}
stripe.webhook.secret=${STRIPE_WEBHOOK_SECRET}
app.frontend.url=${FRONTEND_URL:https://beauty-room.it}

# CORS
app.cors.origins=${APP_CORS_ORIGINS}

# Mailgun
mailgun.apiKey=${MAILGUN_API_KEY}
mailgun.domain=${MAILGUN_DOMAIN}
mailgun.from=${MAIL_FROM}
mailgun.baseUrl=${MAILGUN_BASE_URL:https://api.mailgun.net}

# Worker tuning 
email.outbox.pollMs=${EMAIL_OUTBOX_POLL_MS:15000}

app.brand.logoUrl=${APP_BRAND_LOGO_URL}
app.brand.name=Beauty Room
app.brand.address=Viale Risorgimento 587, Calusco d'Adda (BG)
app.brand.phone=+39 378 092 1723
app.brand.phoneE164=+393780921723
app.brand.email=rossimichela.pmu@gmail.com
app.brand.vat=04837370164
app.brand.instagramUrl=https://www.instagram.com/rossimichela.pmu
app.brand.facebookUrl=https://www.facebook.com/rossimichela.pmu


# Google Reviews — aggiornare con il link reale dopo il go-live
app.google.review.url=${APP_GOOGLE_REVIEW_URL:https://g.page/r/PLACEHOLDER/review}

# Limite massimo singolo file
spring.servlet.multipart.max-file-size=15MB
# Limite massimo totale della richiesta (8 immagini × 15MB + overhead)
spring.servlet.multipart.max-request-size=60MB