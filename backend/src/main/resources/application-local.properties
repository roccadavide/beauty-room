# Spring DevTools — auto-restart for local development
# Trigger-file mode: restart only when .devtools-trigger is touched
# (prevents restart storms when Claude Code edits multiple files)
spring.devtools.restart.enabled=true
spring.devtools.restart.poll-interval=2s
spring.devtools.restart.quiet-period=1s
spring.devtools.restart.additional-paths=src/main/java
spring.devtools.restart.trigger-file=.devtools-trigger
spring.devtools.livereload.enabled=true
