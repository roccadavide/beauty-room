<!doctype html>
<html lang="it">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#fffdf8" />

    <link rel="icon" type="image/png" href="/beauty-room-icon.png" />

    <title>Beauty Room di Michela</title>

    <meta name="geo.region" content="IT-BG" />
    <meta name="geo.placename" content="Calusco d'Adda, Italia" />
    <meta name="geo.position" content="45.69296454823625;9.465113717532258" />
    <meta name="ICBM" content="45.69296454823625, 9.465113717532258" />

    <style>
      #splash-screen {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: #1e1814;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-direction: column;
        gap: 28px;
      }
      .splash-logo {
        width: 140px;
        opacity: 0;
        animation: splashLogoIn 0.6s ease forwards 0.1s;
      }
      @media (max-width: 480px) {
        .splash-logo { width: 110px; }
      }
      .splash-bar-track {
        width: 140px;
        height: 2px;
        background: rgba(184, 151, 106, 0.25);
        border-radius: 1px;
        overflow: hidden;
      }
      @media (max-width: 480px) {
        .splash-bar-track { width: 110px; }
      }
      .splash-bar-fill {
        height: 100%;
        width: 0%;
        background: #b8976a;
        animation: splashBarFill 1.8s ease forwards 0.3s;
      }
      #splash-screen.splash-hidden {
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.55s ease 0.1s;
      }
      #root {
        opacity: 0;
        transition: opacity 0.5s ease;
      }
      #root.app-visible {
        opacity: 1;
      }
      @keyframes splashLogoIn {
        from { opacity: 0; transform: translateY(-8px); }
        to   { opacity: 1; transform: translateY(0); }
      }
      @keyframes splashBarFill {
        from { width: 0%; }
        to   { width: 100%; }
      }
    </style>

    <script type="application/ld+json">

        "url": "https://www.beauty-room.it",
        "logo": "https://www.beauty-room.it/logo.png",
        "image": "https://www.beauty-room.it/og-default.jpg",
        "telephone": "+39 378 092 1723",
        "email": "rossimichela.pmu@gmail.com",
        "priceRange": "€€",
        "address": {
          "@type": "PostalAddress",
          "streetAddress": "Viale Risorgimento 587",
          "addressLocality": "Calusco d'Adda",
          "postalCode": "24033",
          "addressCountry": "IT"
        },
        "geo": {
          "@type": "GeoCoordinates",
          "latitude": 45.69296454823625,
          "longitude": 9.465113717532258
        },
        "openingHoursSpecification": [
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Tuesday", "Thursday"],
            "opens": "09:00",
            "closes": "16:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Wednesday", "Friday"],
            "opens": "09:00",
            "closes": "19:00"
          },
          {
            "@type": "OpeningHoursSpecification",
            "dayOfWeek": ["Saturday"],
            "opens": "09:00",
            "closes": "14:30"
          }
        ],
        "sameAs": ["https://www.instagram.com/rossimichela.pmu", "https://www.facebook.com/rossimichela.pmu"],
        "hasMap": "https://maps.app.goo.gl/xvVzpz9rgzsxWVNt7",
        "currenciesAccepted": "EUR",
        "paymentAccepted": "Contanti, Carta di credito, Stripe",
        "areaServed": {
          "@type": "City",
          "name": "Calusco d'Adda"
        }
      }
    </script>
  </head>
  <body>
    <div id="splash-screen">
      <img class="splash-logo" src="/logo.png" alt="Beauty Room" />
      <div class="splash-bar-track">
        <div class="splash-bar-fill"></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
